<!DOCTYPE html>
<html>
    <head>
        <title>Navbar</title>
        <style>
            body {
                margin: 0;
                font-family: cursive;
            }

            .topnav a {
                float:left;
                color:darkorange;
                padding: 14px 16px;
                text-decoration: none;
                font-size: 17px;
            }

            .topnav {
                overflow: hidden;
                background-color: #333;
            }

            .topnav a:hover {
                background-color: #ddd;
                color: black;
            }

            .topnav a.active {
                background-color:crimson;
                color:black;
            }

            
        </style>
    </head>

    <body>
        <div class="topnav">
            <a class="active" href="#home">Home</a>
            <a href="#">About_Us</a>
            <a href="#">Gallery</a>
            <a href="#">Contact_Us</a>
        </div>
    </body>
</html>
