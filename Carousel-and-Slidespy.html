<!DOCTYPE html>
<html lang="en">

<head>

    <title>Scrollspy + Carousel (No jQwery)</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <style>
      body {
        position: relative;
      }

    p  { 
        font-size: 18px;
    }

    #carouselSection  {
        padding-top:70px;
        background: #f8f9fa;
    }

    #section1 {
        padding-top: 70px;
        height: 500px;
    }

    #section2  {
        padding-top: 70px;
        height: 500px;
        color:green;
        background-color: white;
    }

    #carousel.item img {
        width: 100%;
        height: 400px;
        object-fit:cover;
    }
    </style>

</head>

<body data-bs-spy="scroll" data-bs-target="navbar" data-bs-offset="50">
    
    <nav id="navbar" class="navbar navber-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">

            <a class="Navbar-brand" href="#">Codingal</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#myNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="myNavbar">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link"
                        href="#carouselSection">Carousel</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#Section1">Section1</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#Section2">Section2</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="carouselSection" class="container">
        <h2>Carousel Example</h2>

        <div class="carrousel-indicators">
            <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="2"></button>
        </div>

        <div class="carousel-inner">
        
            <div class="carousel-item active">
        
                <img src="Tanqr fan.jpg" alt="Image 1">
        
            </div>
        
            <div class="carousel-item">
        
                <img src="Nosiny.jpg" alt="Image 2">
        
            </div>
        
            <div class="carousel-item">
        
                <img src="neymarrr.jpg" alt="Image 3">
        
            </div>
        
        </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#myCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            
            <button class="carousel-control-next" type="button" data-bs-target="#myCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>

        </div>
        </div>

        <div id="Section1" class="container-fluid">
           <h1>Section1</h1>
           <h3>Codingal</h3>
           <p>Scroll this section</p>
        </div>

        <div id="Section2" class="container-fluid">
            <h1>Section2</h1>
            <h3>Codingal</h3>
            <p>Scroll this section</p>
        </div>

        <script>
            new bootstrap.ScrollSpy(document.body, {
                target: '#navbar',
                offset:50
            });
        </script>
        
       

</body>


</html>
