<!DOCTYPE html>
<html>
 <head>
    <style>
        .container  {
     display:flex ;
     flex-direction: row;
     justify-content:space-around;
     align-items: center;

     height:100px ;
     background-color:black
        }
       .box  {
        width: 80px;
        height: 80px;
        background-color:azure;
        
        font-size:20px;
        display: flex;
        justify-content: flex-end;
        align-items: stretch;
        font-family: cursive;
       }
    </style>

    
 </head>   
 <body>
    <h1>FlexBox Complete Example </h1> 
    <div class="container">
    <div class="box " >1 </div>
<div class="box ">2 </div>
<div class="box ">3</div>
    </div>

 </body>
</html>
