<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

        <style>
    .demo-box {
        margin-top: 20px;
    }

        </style>
    </head>

    <body>

        <div class="container bg-success text-white p-4 demo-box">
        <h1>Container</h1>
        <p>Responsive fixed width container.</p>
        </div>
        
        <div class="container-fluid bg-primary text white p-4 demo-box">
            <h1>Container fluid</h1>
            <p>Full Width container.</p>
        </div>

        <div class="container border border-dark p-4 demo-box">
            <h1>Border example</h1>
            <p>Container with border</p>
        </div>

        <div class="container bg-danger text white p-4 demo-box">
            <h1>Color example</h1>
            <p>Red background with white text.</p>
        </div>

        <div class="container border border-dark bg-warning p-4 demo-box">
        <h1>Combined example</h1>
         <p>Container+Border+Color</p>
    </body>
</html>
